<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chai Tailwind</title>
</head>

<body>
    <h1 class="chai-rounded-2 chai-pos-relative chai-fs-8 chai-d-flex chai-bg-red chai-italic-italic chai-shadow-inner">
        Hello World</h1>

    <script>
        // sab utility object mein add honge
        const utilityMap = {
            'p': 'padding',
            'pt': 'paddingTop',
            'pb': 'paddingBottom',
            'pl': 'paddingLeft',
            'pr': 'paddingRight',
            'm': 'margin',
            'mt': 'marginTop',
            'mb': 'marginBottom',
            'ml': 'marginLeft',
            'mr': 'marginRight',
            'fs': 'fontSize',
            'rounded': 'borderRadius',
            'w': 'width',
            'h': 'height',
            'bw': 'borderWidth',
            'gap': 'gap',
            'z': 'zIndex',
        };

        const staticMap = {
            'text': 'textAlign',
            'bg': 'backgroundColor',
            'text-color': 'color',
            'd': 'display',
            'pos': 'position',
            'fw': 'fontWeight',
            'italic': 'fontStyle',
            'shadow': 'boxShadow',
            'cursor': 'cursor',
            'overflow': 'overflow'
        };

        // Saara elements select hoga jisme 'chai-' class ho
        const elements = document.querySelectorAll('[class*="chai-"]');

        elements.forEach(el => {
            el.classList.forEach(className => {

                if (className.startsWith('chai-')) {
                    const parts = className.split('-'); // ['chai', 'p', '13']
                    const type = parts[1];              // 'p', 'm','text' or 'fs'
                    const value = parts[2];     // '13' or 'textAlign' 
                    console.log(`Processing: ${className} | Type: ${type} | Value: ${value}`);

                    // Agar utility map mein exists karti hai
                    if (utilityMap[type]) {
                        const num = Number(value);
                        const property = utilityMap[type];

                        // 2. Dynamic Logic (Scaling)
                        if (isNaN(num) || value < 2 || value > 12) {
                            el.style[property] = (type === 'fs') ? "16px" : "4px"; // Default fallback
                        } else {
                            // Margin/Padding ke liye power of 2, Font-size/border ke liye value multiply 5 
                            el.style[property] = (type === 'fs') || (type === 'rounded') ? `${value * 5}px` : `${value ** 2}px`;
                        }
                        // Agar static map mein exists karti hai
                    } else if (staticMap[type]) {
                        const property = staticMap[type]
                        el.style[property] = `${value}`
                    }
                }
            });
        });

    </script>
</body>

</html>
